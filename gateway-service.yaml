server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth
              uri: lb://auth
              predicates:
                - Path=/auth-service/**
              filters:
                - StripPrefix=1
            - id: product
              uri: lb://product
              predicates:
                - Path=/product-service/**
              filters:
                - StripPrefix=1
            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/cart-service/**
              filters:
                - StripPrefix=1
            - id: invoice
              uri: lb://invoice
              predicates: 
                - Path=/invoice-service/**
              filters:
               - StripPrefix=1
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost
    prefer-ip-address: true

management:
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,loggers,threaddump,heapdump,gateway"

springdoc:
  swagger-ui:
    urls:
      - name: API Auth
        url: /auth-service/v3/api-docs
      - name: API Product
        url: /product-service/v3/api-docs
      - name: API Cart Service
        url: /cart-service/v3/api-docs
      - name: API Invoice
        url: /invoice-service/v3/api-docs