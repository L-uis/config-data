server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
   gateway:
     server:
       webmvc:
         routes:
           - id: auth
             uri: lb://auth
             predicates:
               - Path=/auth/**
             filters:
               - StripPrefix=1
           - id: product
             uri: lb://product
             predicates:
               - Path=/product/**
             filters:
               - StripPrefix=1
eureka:
 client:
   register-with-eureka: true
   fetch-registry: true
   service-url:
     defaultZone: http://localhost:8761/eureka
 instance:
   hostname: localhost
   prefer-ip-address: true

management:
  endpoint:
    health:
     show-details: always
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,loggers,threaddump,heapdump"
